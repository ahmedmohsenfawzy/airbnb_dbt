# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
flags:
  use_managed_iceberg: false
  use_concurrent_microbatch: true
  use_materialization_v2: true

name: 'airbnb'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'airbnb'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
asset-paths: ["assets"]

target-path: "target"          # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
# Configuring models
on-run-start:
  - "CREATE TABLE IF NOT EXISTS {{ target.schema }}.audit_log ( model_name STRING, run_timestamp TIMESTAMP )"


models:

  airbnb:
  
    # +grants:
    #   select: ["transform", "reporter"] # for sonwflack data leak

    +post-hook:
      - "INSERT INTO {{ target.schema }}.audit_log VALUES ('{{ this }}', CURRENT_TIMESTAMP)"
    # +enabled: true
    # This applies to EVERYTHING in the models/ folder
    +file_format: delta      # Specifically tells Databricks to use Delta Lake
    +materialized: view   # This tells dbt to build models as views
    dim:
      +materialized: table  # This tells dbt to build models in the dim/ subdirectory as tables
    src:
      +materialized: ephemeral  # This tells dbt to build models in the src/ subdirectory as ephemeral models

# data_tests:
#   +store_failures: true
#   +schema: _test_failures  # for production